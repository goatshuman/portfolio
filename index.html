<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anshuman | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --background: #0a0a0a; }
        body { background-color: var(--background); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .text-glow { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .bg-grid { background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 40px 40px; }
        @keyframes fall { from { transform: translateY(-10vh); } to { transform: translateY(110vh); } }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0.5; animation: fall linear infinite; }
    </style>
</head>
<body class="bg-grid">
    <div id="stars-container"></div>
    <nav class="fixed top-0 w-full z-50 backdrop-blur-md border-b border-white/10 bg-black/50 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-4">
            <span class="font-bold text-xl tracking-wider text-glow">G.O.A.T</span>
            <div class="flex gap-8 text-sm font-medium text-gray-400">
                <a href="#about" class="hover:text-blue-500 transition-colors">ABOUT</a>
                <a href="#socials" class="hover:text-blue-500 transition-colors">SOCIALS</a>
                <a href="#contact" class="hover:text-blue-500 transition-colors">CONTACT</a>
            </div>
        </div>
    </nav>
    <section class="min-h-screen flex flex-col justify-center items-center px-4 text-center">
        <h1 class="text-6xl md:text-9xl font-black tracking-tighter mb-6 text-glow uppercase">ANSHUMAN</h1>
        <p class="text-xl md:text-3xl text-gray-400 font-light tracking-widest uppercase text-glow">Crafting Digital Dominance</p>
    </section>
    <section id="about" class="py-32 px-4 max-w-7xl mx-auto border-t border-white/10">
        <h2 class="text-4xl font-bold mb-8 text-glow uppercase">The Architect</h2>
        <p class="text-lg text-gray-400">Discord Bot Maker and Gamer focused on performance and scale.</p>
    </section>
    <section id="socials" class="py-32 px-4 border-t border-white/10 text-center">
        <h2 class="text-4xl font-bold mb-16 text-glow uppercase">Network Uplinks</h2>
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-8 max-w-7xl mx-auto">
            <a href="https://discord.com" target="_blank" class="p-8 rounded-3xl bg-white/5 border border-white/10 hover:border-blue-500 transition-all">
                <div class="text-2xl text-blue-500">Discord</div>
                <div class="text-sm text-gray-500">@goatshuman</div>
            </a>
            <a href="https://instagram.com/v15back" target="_blank" class="p-8 rounded-3xl bg-white/5 border border-white/10 hover:border-pink-500 transition-all">
                <div class="text-2xl text-pink-500">Instagram</div>
                <div class="text-sm text-gray-500">@v15back</div>
            </a>
            <a href="https://github.com/goatshuman" target="_blank" class="p-8 rounded-3xl bg-white/5 border border-white/10 hover:border-gray-300 transition-all">
                <div class="text-2xl text-gray-300">GitHub</div>
                <div class="text-sm text-gray-500">goatshuman</div>
            </a>
            <a href="mailto:goat@anshuman.gg" class="p-8 rounded-3xl bg-white/5 border border-white/10 hover:border-red-500 transition-all">
                <div class="text-2xl text-red-500">Email</div>
                <div class="text-sm text-gray-500">goat@anshuman.gg</div>
            </a>
        </div>
    </section>
    <footer class="py-12 text-center text-gray-600 text-sm">G.O.A.T // 2026</footer>
    <script>
        const container = document.getElementById('stars-container');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            star.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(star);
        }
    </script>
</body>
</html>
